naftiko: "1.0.0-alpha1"

info:
  label: Ticketmaster Discovery API
  description: >-
    Ticketmaster Discovery API for searching events, attractions, venues, and
    classifications across the global Ticketmaster platform with access to
    over 230,000 events.
  tags:
    - Ticketmaster
    - Events
    - Entertainment
    - Discovery
    - Tickets
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TICKETMASTER_API_KEY: TICKETMASTER_API_KEY

capability:
  consumes:
    - type: http
      namespace: ticketmaster-discovery
      baseUri: https://app.ticketmaster.com/discovery/v2
      description: Ticketmaster Discovery REST API for event search
      authentication:
        type: apikey
        key: apikey
        value: "{{TICKETMASTER_API_KEY}}"
        placement: query
      resources:
        - name: events
          path: /events.json
          description: Event search and retrieval
          operations:
            - name: search-events
              method: GET
              description: Search for live events by keyword, location, date, and classification
              inputParameters:
                - name: keyword
                  in: query
                  type: string
                  required: false
                - name: attractionId
                  in: query
                  type: string
                  required: false
                - name: venueId
                  in: query
                  type: string
                  required: false
                - name: classificationName
                  in: query
                  type: string
                  required: false
                - name: countryCode
                  in: query
                  type: string
                  required: false
                - name: stateCode
                  in: query
                  type: string
                  required: false
                - name: city
                  in: query
                  type: string
                  required: false
                - name: latlong
                  in: query
                  type: string
                  required: false
                - name: radius
                  in: query
                  type: integer
                  required: false
                - name: startDateTime
                  in: query
                  type: string
                  required: false
                - name: endDateTime
                  in: query
                  type: string
                  required: false
                - name: size
                  in: query
                  type: integer
                  required: false
                - name: page
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-event
              method: GET
              description: Get details for a specific event
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: attractions
          path: /attractions.json
          description: Attraction search (artists, sports teams, etc.)
          operations:
            - name: search-attractions
              method: GET
              description: Search for attractions on Ticketmaster
              inputParameters:
                - name: keyword
                  in: query
                  type: string
                  required: false
                - name: classificationName
                  in: query
                  type: string
                  required: false
                - name: countryCode
                  in: query
                  type: string
                  required: false
                - name: size
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-attraction
              method: GET
              description: Get details for a specific attraction
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: venues
          path: /venues.json
          description: Venue search and details
          operations:
            - name: search-venues
              method: GET
              description: Search for venues by name or location
              inputParameters:
                - name: keyword
                  in: query
                  type: string
                  required: false
                - name: countryCode
                  in: query
                  type: string
                  required: false
                - name: stateCode
                  in: query
                  type: string
                  required: false
                - name: city
                  in: query
                  type: string
                  required: false
                - name: latlong
                  in: query
                  type: string
                  required: false
                - name: radius
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-venue
              method: GET
              description: Get details for a specific venue
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: classifications
          path: /classifications.json
          description: Event classifications (segments, genres, sub-genres)
          operations:
            - name: search-classifications
              method: GET
              description: Browse event classifications
              inputParameters:
                - name: keyword
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: suggest
          path: /suggest.json
          description: Search suggestions
          operations:
            - name: get-suggestions
              method: GET
              description: Get search autocomplete suggestions
              inputParameters:
                - name: keyword
                  in: query
                  type: string
                  required: true
                - name: countryCode
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: ticketmaster-discovery-rest
      resources:
        - path: /v1/events
          name: events
          description: Event search
          operations:
            - method: GET
              name: search-events
              description: Search for live events
              call: "ticketmaster-discovery.search-events"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: ticketmaster-discovery-mcp
      transport: http
      tools:
        - name: search-events
          description: Search for Ticketmaster events by keyword, location, or date range
          hints:
            readOnly: true
            openWorld: true
          call: "ticketmaster-discovery.search-events"
          with:
            keyword: "tools.keyword"
            countryCode: "tools.countryCode"
            city: "tools.city"
            startDateTime: "tools.startDateTime"
            endDateTime: "tools.endDateTime"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-event
          description: Get details for a specific Ticketmaster event
          hints:
            readOnly: true
            openWorld: true
          call: "ticketmaster-discovery.get-event"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: search-attractions
          description: Search for artists, sports teams, and other attractions on Ticketmaster
          hints:
            readOnly: true
            openWorld: true
          call: "ticketmaster-discovery.search-attractions"
          with:
            keyword: "tools.keyword"
          outputParameters:
            - type: object
              mapping: "$."

        - name: search-venues
          description: Search for event venues by name or location
          hints:
            readOnly: true
            openWorld: true
          call: "ticketmaster-discovery.search-venues"
          with:
            keyword: "tools.keyword"
            city: "tools.city"
            countryCode: "tools.countryCode"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-suggestions
          description: Get autocomplete suggestions for event, venue, or attraction searches
          hints:
            readOnly: true
            openWorld: true
          call: "ticketmaster-discovery.get-suggestions"
          with:
            keyword: "tools.keyword"
          outputParameters:
            - type: object
              mapping: "$."
